<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥品冰箱溫度登記表</title>
<style>
  :root{
    --navy:#0f3057;
    --blue:#1f6f9c;
    --pale:#eef5f9;
    --line:#cfd9e0;
    --ink:#1c2b36;
    --muted:#5e7385;
    --danger:#b3261e;
    --danger-bg:#fdecea;
    --ok:#1c7a4d;
    --paper:#ffffff;
    --bg:#f4f7f9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  .topbar-wrap{
    max-width:1180px;
    margin:0 auto;
    padding:4px 16px 0;
  }
  .topbar{
    background:linear-gradient(135deg,var(--navy),var(--blue));
    color:#fff;
    padding:8px 16px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .topbar-row1{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .topbar-row2{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:8px;
    min-height:22px;
  }
  .topbar .icon{
    width:26px;
    height:26px;
    flex:none;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .topbar .icon svg{width:20px; height:20px;}
  .topbar-text{
    display:flex;
    flex-direction:column;
    gap:1px;
    line-height:1.25;
  }
  .topbar h1{
    margin:0;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.5px;
  }
  .topbar p{
    margin:0;
    font-size:11px;
    color:#e3f3ec;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:2px 16px 60px;
  }
  .sticky-zone{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--bg);
    padding-top:2px;
  }
  .controls{
    background:var(--bg);
    padding:0 0 4px;
  }
  .controls-inner{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:7px 14px;
    display:flex;
    flex-wrap:nowrap;
    gap:8px;
    align-items:center;
    width:100%;
  }
  .ctrl-label{
    font-size:12px;
    color:var(--muted);
    font-weight:600;
    white-space:nowrap;
    flex-shrink:0;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:2px;
    flex:1;
    min-width:0;
  }
  .field select,
  .field input{
    width:100%;
  }
  .field label{
    font-size:11px;
    color:var(--muted);
    font-weight:600;
  }
  select, input[type=number], input[type=month], input[type=text]{
    font-family:inherit;
    font-size:13px;
    padding:5px 7px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
  }
  select:focus, input:focus{
    outline:2px solid var(--blue);
    outline-offset:1px;
  }
  .manager-field{flex:1; min-width:160px;}
  .manager-field input{width:100%;}
  .note{
    background:var(--danger-bg);
    border:1px solid #f3c2bd;
    color:var(--danger);
    border-radius:8px;
    padding:7px 12px;
    font-size:12px;
    margin:0 0 8px;
    line-height:1.5;
  }
  .status{
    font-size:12px;
    color:var(--ok);
    margin-bottom:4px;
    min-height:14px;
  }
  .table-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
  }
  .table-scroll{
    border-radius:10px;
  }
  table{
    border-collapse:separate;
    border-spacing:0;
    width:100%;
    min-width:640px;
  }
  thead th{
    background:var(--pale);
    color:var(--navy);
    font-size:13px;
    padding:10px 8px;
    border-bottom:2px solid var(--line);
    border-right:1px solid var(--line);
    white-space:nowrap;
  }
  #tableHeadRow1 th{
    position:sticky;
    top:0;
    z-index:4;
  }
  #tableHeadRow2 th{
    position:sticky;
    z-index:3;
  }
  thead th:last-child, tbody td:last-child{border-right:none;}
  tbody td{
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    padding:4px 6px;
    text-align:center;
    font-size:13px;
  }
  tbody tr:nth-child(even){background:#fafcfd;}
  tbody tr.weekend{background:#fff8f0;}
  .date-cell{
    font-weight:700;
    color:var(--navy);
    background:var(--pale)!important;
    min-width:46px;
  }
  td input[type=number],
  .fridge-card input[type=number]{
    width:62px;
    height:32px;
    text-align:center;
    padding:4px 2px;
    font-size:13px;
    line-height:1.2;
    -moz-appearance:textfield;
  }
  td input[type=number]::-webkit-outer-spin-button,
  td input[type=number]::-webkit-inner-spin-button,
  .fridge-card input[type=number]::-webkit-outer-spin-button,
  .fridge-card input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .fridge-group{
    display:flex;
    gap:4px;
    justify-content:center;
  }
  .fridge-group .sub-field{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .fridge-group .sub-label{
    font-size:10px;
    color:var(--muted);
    text-align:center;
  }
  thead th.fridge-header{
    padding-bottom:4px;
  }
  td input.abn-input{
    width:100%;
    min-width:140px;
    text-align:left;
  }
  td input.sign-input{
    width:90px;
    text-align:center;
  }
  td input.checker-input{
    width:100%;
    min-width:90px;
    text-align:center;
  }
  td input.out-of-range{
    background:var(--danger-bg);
    border-color:var(--danger);
    color:var(--danger);
    font-weight:700;
  }
  td input.logic-error, .fridge-card .sub-row input.logic-error{
    background:#fff4e0;
    border-color:#d98c00;
    color:#a35f00;
    font-weight:700;
    box-shadow:0 0 0 1px #d98c00 inset;
  }
  .reviewer-cell{
    background:#fbfaf6;
    vertical-align:middle;
  }
  .legend{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    font-size:12px;
    color:var(--muted);
    margin:10px 2px 0;
  }
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .swatch{width:12px; height:12px; border-radius:3px; display:inline-block;}
  .sw-range{background:var(--danger-bg); border:1px solid var(--danger);}
  .footer-actions{
    display:flex;
    gap:10px;
    margin-top:16px;
    flex-wrap:wrap;
  }
  button{
    font-family:inherit;
    font-size:13px;
    padding:9px 16px;
    border-radius:7px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--navy);
    cursor:pointer;
  }
  button.primary{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
  }
  button:hover{filter:brightness(0.97);}

  /* ===== Mode toggle ===== */
  .topbar-user{
    display:flex; align-items:center; gap:8px; flex-shrink:0;
  }
  .user-badge{
    background:rgba(255,255,255,0.2);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:4px 10px;
    border-radius:20px;
    white-space:nowrap;
  }
  .logout-btn{
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    color:#fff;
    font-size:12px;
    padding:4px 10px;
    border-radius:6px;
    cursor:pointer;
    font-family:inherit;
  }
  .logout-btn:hover{ background:rgba(255,255,255,0.25); }
  .topbar-login{
    display:flex; align-items:center; gap:6px; flex-shrink:0;
  }
  .login-select{
    font-size:12px;
    padding:4px 8px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.1);
    color:#fff;
  }
  .login-select option{ color:var(--ink); background:#fff; }
  .login-btn{
    background:#fff;
    border:none;
    color:var(--navy);
    font-size:12px;
    font-weight:700;
    padding:4px 12px;
    border-radius:6px;
    cursor:pointer;
    font-family:inherit;
  }
  .login-btn:hover{ background:var(--pale); }

  .login-overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(150deg, #6b8fa3 0%, #8fa8a0 50%, #b2bfb8 100%);
    z-index:1000;
    display:flex;
    flex-direction:column;
  }
  .login-overlay.hidden{ display:none; }
  .login-topbar{
    width:100%;
    background:rgba(80,110,122,0.55);
    backdrop-filter:blur(8px);
    padding:10px 20px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
  }
  .login-topbar-icon{
    width:32px; height:32px;
    background:rgba(255,255,255,0.15);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .login-topbar-title{
    font-size:15px;
    font-weight:800;
    color:#fff;
    margin-bottom:2px;
  }
  .login-topbar-sub{
    font-size:11px;
    color:rgba(255,255,255,0.75);
  }
  .login-modal{
    background:#fff;
    border-radius:20px;
    width:320px;
    max-width:90vw;
    box-shadow:0 24px 80px rgba(0,0,0,0.35);
    text-align:center;
    padding:32px 24px 28px;
    margin:auto;
    position:relative;
    top:-20px;
  }
  .login-icon-wrap{
    width:68px; height:68px;
    background:linear-gradient(135deg,#0f3057,#1f6f9c);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 14px;
  }
  .login-modal-title{
    font-size:18px;
    font-weight:800;
    color:var(--navy);
    margin-bottom:4px;
  }
  .login-modal-sub{
    font-size:10px;
    color:var(--muted);
    line-height:1.6;
    margin-bottom:22px;
  }
  .login-field-group{
    text-align:left;
    margin-bottom:14px;
  }
  .login-field-label{
    font-size:12px;
    font-weight:700;
    color:var(--navy);
    display:block;
    margin-bottom:5px;
  }
  .login-id-row{
    display:flex;
    align-items:stretch;
    border:2px solid #8fa8a0;
    border-radius:10px;
    overflow:hidden;
  }
  .login-id-prefix{
    background:#6b8fa3;
    color:#fff;
    font-size:20px;
    font-weight:900;
    width:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .login-id-input{
    flex:1;
    border:none;
    outline:none;
    font-size:20px;
    font-weight:700;
    color:var(--navy);
    padding:10px 12px;
    letter-spacing:6px;
    text-align:center;
    background:#fff;
    min-width:0;
  }
  .login-id-input::placeholder{ color:#ccc; letter-spacing:3px; font-weight:400; font-size:14px; }
  .login-name-display{
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 14px;
    font-size:14px;
    color:var(--muted);
    background:#f9fafb;
    min-height:42px;
  }
  .login-name-display.found{
    color:#6b8fa3;
    font-weight:700;
    background:#eef3f5;
    border-color:#8fa8a0;
  }
  .login-hint{
    font-size:12px;
    color:var(--danger);
    font-weight:600;
    min-height:16px;
    margin-bottom:6px;
    text-align:left;
  }
  .login-submit-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#6b8fa3,#8fa8a0);
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    margin-top:4px;
    box-shadow:0 4px 14px rgba(31,111,156,0.4);
  }
  .login-submit-btn:hover{ filter:brightness(1.08); }

  /* topbar-controls: date + shift pills + mode buttons */
  .topbar-controls{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:6px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:6px 10px;
    margin-bottom:4px;
  }
  #dateSelect{
    flex:0 0 auto;
    width:150px;
    font-size:15px;
    font-weight:700;
    padding:6px 8px;
    border:1.5px solid var(--blue);
    border-radius:8px;
    color:var(--navy);
    text-align:center;
    background:#fff;
  }
  .shift-pills-top{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    flex:1;
    min-width:0;
  }
  .top-actions-right-controls{
    display:flex;
    gap:5px;
    margin-left:auto;
    flex-shrink:0;
  }
  .site-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 4px;
    margin-bottom:6px;
  }
  .site-row select{
    font-size:13px;
    padding:4px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
  }
  .top-stats-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  #modeButtons{
    margin-left:auto;
    flex-shrink:0;
  }
  /* ===== Export PDF button ===== */
  .export-pdf-btn{
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    background:linear-gradient(135deg,var(--navy),var(--blue));
    color:#fff;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }
  .export-pdf-btn:hover{ filter:brightness(0.95); }
  .export-pdf-btn.hidden-in-mode{ display:none; }
  .stat-card-extra.hidden-in-mode{ display:none; }

  /* ===== Stat cards row ===== */
  .stat-cards-row{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    margin-bottom:14px;
  }
  .stat-card{
    background:#fff;
    border:1px solid var(--line);
    border-left:4px solid var(--line);
    border-radius:8px;
    padding:6px 12px;
  }
  .stat-card.stat-days{ background:#eef5ff; border-left-color:#2f6fd1; }
  .stat-card.stat-days .stat-value{ color:#1c4d8f; }
  .stat-card.stat-abnormal{ background:#fff6ea; border-left-color:#e08a1e; }
  .stat-card.stat-abnormal .stat-value{ color:#c46a00; }
  .stat-card.stat-rate{ background:#eefaf1; border-left-color:#28a35a; }
  .stat-card.stat-rate .stat-value{ color:#1c7a4d; }
  .stat-card.stat-rate.incomplete{ background:var(--danger-bg); border-left-color:var(--danger); }
  .stat-card.stat-rate.incomplete .stat-value{ color:var(--danger); }
  #statCardToday{
    border-left:4px solid var(--blue);
    min-width:120px;
    padding:6px 16px;
  }
  #statCardToday.incomplete{
    border-left-color:var(--danger);
    background:var(--danger-bg);
  }
  #statCardToday.incomplete .stat-label{ color:var(--danger); }
  #statCardToday.incomplete .stat-value{ color:var(--danger); }
  .stat-label{ font-size:10px; color:var(--muted); margin-bottom:2px; }
  .stat-value{ font-size:14px; font-weight:700; color:var(--navy); }
  .stat-value.warn{ color:#c98a1f; }

  /* ===== Monthly feed view (blue) ===== */
  .feed-header-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:10px;
    font-size:14px;
    font-weight:700;
    color:var(--navy);
  }
  .feed-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:0 0 12px;
    margin-bottom:16px;
    overflow-x:auto;
  }
  .feed-table-wrap{ width:100%; max-height:65vh; overflow:auto; }
  .feed-sticky-head{ display:none; }
  table.feed-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    min-width:600px;
  }
  table.feed-table th{
    position:sticky;
    top:0;
    z-index:5;
    background:var(--pale);
    color:var(--navy);
    font-size:12px;
    padding:8px 6px;
    border-bottom:2px solid var(--line);
    white-space:nowrap;
    text-align:center;
  }
  table.feed-table td{
    border-bottom:1px solid var(--line);
    padding:7px 6px;
    font-size:13px;
    text-align:center;
  }
  table.feed-table td.feed-date-cell{
    font-weight:700;
    color:var(--navy);
    background:var(--pale);
  }
  table.feed-table td.feed-shift-cell{ color:var(--blue); font-weight:600; white-space:nowrap; }
  table.feed-table tr.feed-group-even td:not(.feed-date-cell){ background:#f3f8fc; }
  table.feed-table tr.feed-group-today td{ background:#e4f0fb; }
  table.feed-table td.feed-out-of-range{ color:var(--danger); font-weight:700; }
  table.feed-table td.feed-empty{ color:var(--muted); }
  .today-pin{ color:#c0392b; margin-left:2px; }

  .checker-inline-row td{
    background:var(--pale);
    border-top:2px solid var(--blue);
    border-bottom:2px solid var(--blue);
    padding:7px 12px;
    font-size:12px;
    color:var(--navy);
    font-weight:600;
    text-align:left !important;
    vertical-align:middle;
  }
  .checker-inline-label{ margin-right:8px; }
  .checker-inline-input{
    font-size:12px;
    padding:4px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    width:160px;
  }
    border-top:1px dashed var(--line);
    margin-top:10px;
    padding-top:8px;
  }
  .weekly-checker-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:6px 2px;
    font-size:12px;
  }
  .weekly-checker-row .wk-label{ color:var(--muted); min-width:160px; }
  .weekly-checker-row input{
    flex:1;
    min-width:120px;
    max-width:220px;
    font-size:13px;
    padding:6px 9px;
  }
  .weekly-checker-row .wk-status{
    font-size:12px;
    color:var(--ok);
    white-space:nowrap;
  }
  .weekly-checker-row .wk-status.empty{ color:var(--muted); }

  /* ===== Approval card ===== */
  .approval-card{
    background:#eef3fb;
    border:1px solid #cfe0f5;
    border-left:4px solid var(--blue);
    border-radius:10px;
    padding:14px 18px;
    margin-bottom:18px;
  }
  .approval-card .ap-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:10px;
    font-size:14px;
    font-weight:700;
    color:var(--navy);
  }
  .approval-card .ap-header .ap-meta{ font-size:12px; font-weight:500; color:var(--muted); }
  .approval-card .ap-status{
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; font-weight:700;
    margin-bottom:8px;
  }
  .approval-card .ap-status.approved{ color:var(--ok); }
  .approval-card .ap-status.pending{ color:#9a6400; }
  .approval-card .ap-detail{ font-size:12px; color:var(--ink); margin-bottom:4px; }
  .approval-card .ap-form{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:10px;
  }
  .approval-card .ap-form input,
  .approval-card .ap-form textarea{
    width:100%;
    font-size:13px;
    padding:8px 10px;
  }
  .approval-card .ap-form textarea{ min-height:50px; resize:vertical; }
  .approval-card button{
    align-self:flex-start;
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
  }

  .view-toggle{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .mode-btn{
    padding:5px 12px;
    border-radius:8px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--muted);
    font-size:12px;
    font-weight:600;
    cursor:pointer;
  }
  .mode-btn.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }

  @media print{
    @page{ size:A4 portrait; margin:4mm 5mm; }
    html, body{

    body *{ visibility:hidden; }

<script>

// 各院區「每週檢核者」預設人員（尚未手動填寫時自動帶入）
const SITE_DEFAULT_CHECKER_ID = {
  "斗六院區": "Y00326"
};
function getSiteDefaultCheckerName(siteName){
  const id = SITE_DEFAULT_CHECKER_ID[siteName];
  if(!id) return '';
  const found = (STAFF[siteName] || []).find(s => s.id === id);
  return found ? found.name : '';
}

// 各院區「組長」設定：異常處理記錄的確認人員、以及組長月底核定的核定人員，
// 都固定使用此人員身分（先前 confirmedBy 已寫死為 Y06100，這裡統一集中管理）。
const SITE_TEAM_LEAD_ID = {
  "斗六院區": "Y06100"
};
function findStaffById(siteName, id){
  return (STAFF[siteName] || []).find(s => s.id === id) || null;
}
function getSiteTeamLead(siteName){
  const id = SITE_TEAM_LEAD_ID[siteName];
  if(!id) return null;
  return findStaffById(siteName, id);
}
function getSiteTeamLeadName(siteName){
  const lead = getSiteTeamLead(siteName);
  return lead ? lead.name : '';
}
// 依儲存的 confirmedBy（可能是員工編號或名字）解析出顯示用姓名；
// 若該筆紀錄尚未指定確認人員，預設回退為該院區組長。
function resolveConfirmedByName(siteName, confirmedByRaw){
  if(confirmedByRaw){
    const found = findStaffById(siteName, confirmedByRaw) ||
      (STAFF[siteName] || []).find(s => s.name === confirmedByRaw);
    if(found) return found.name;
    return confirmedByRaw;
  }
  return getSiteTeamLeadName(siteName) || '待組長確認';
}

// 每月固定安插幾筆「異常」示範紀錄，方便檢視異常處理紀錄與PDF呈現
const DEMO_ABNORMAL_EVENTS = [
  { day: 5,  shiftKey: 'pm',    fridgeIdx: 1, field:'max', value:'8.6',
    reason:'冷氣故障導致室溫升高', process:'已通報總務及冷氣維修人員到場處理', resolved:'是', recoverTemp:'7.2' },
  { day: 12, shiftKey: 'night', fridgeIdx: 3, field:'min', value:'1.4',
    reason:'停電導致冰箱短暫斷電', process:'已聯繫工務室確認供電並啟動備用電源', resolved:'是', recoverTemp:'3.0' },
  { day: 20, shiftKey: 'am',    fridgeIdx: 0, field:'max', value:'8.3',
    reason:'冰箱門未確實關閉', process:'已重新關緊冰箱門並持續監測30分鐘', resolved:'是', recoverTemp:'6.8' }
];

function buildBuiltInDemoData(site, ym){
  const siteConf = SITES[site];
  if(!siteConf) return null;
  const numDays = daysInMonth(ym);
  const staffList = STAFF[site] || [];
  const defaultChecker = getSiteDefaultCheckerName(site) || (staffList[0] && staffList[0].name) || '';
  const patterns = [
    {min:'2.3', now:'4.5', max:'6.8'},
    {min:'2.5', now:'5.0', max:'7.0'},
    {min:'2.1', now:'4.2', max:'6.5'},
    {min:'2.8', now:'5.5', max:'7.5'},
    {min:'2.4', now:'4.8', max:'7.2'}
  ];
  const blob = { shifts:{}, checkers:{}, approval:null };
  siteConf.shifts.forEach((shift, shiftIdx)=>{
    const rows = {};
    for(let d=1; d<=numDays; d++){
      const day = String(d);
      const temps = siteConf.fridges.map((f, fridgeIdx)=> ({ ...patterns[(d + shiftIdx + fridgeIdx) % patterns.length] }));
      const signer = staffList.length ? staffList[(d + shiftIdx) % staffList.length].name : '';
      const row = {
        temps, reason:'', abn:'', sign: signer,
        savedAt: `${ym}-${String(d).padStart(2,'0')}T00:00:00.000Z`,
        savedBy: signer
      };

      const ev = DEMO_ABNORMAL_EVENTS.find(e => e.day === d && e.shiftKey === shift.key && d <= numDays);
      if(ev){
        temps[ev.fridgeIdx][ev.field] = ev.value;
        row.reason = ev.reason;
        row.abn = ev.process;
        row.resolved = ev.resolved;
        row.recoverTemp = ev.recoverTemp;
        row.confirmedBy = SITE_TEAM_LEAD_ID[site] || '';
        row.fridgeAbn = { [ev.fridgeIdx]: {
          abn: ev.process, recoverTemp: ev.recoverTemp, resolved: ev.resolved,
          confirmed: true, savedAt: `${ym}-${String(d).padStart(2,'0')}`
        }};
      }
      rows[day] = row;
    }
    blob.shifts[shift.key] = { rows };
  });
  const numBlocks = Math.ceil(numDays / 7);
  for(let b=0; b<numBlocks; b++){
    blob.checkers[b] = { name: defaultChecker, date: `${ym}-01` };
  }
  return blob;
}

function getBuiltInDemoData(site, ym){
  if(site === BUILT_IN_DEMO_SITE && BUILT_IN_DEMO_MONTHS.includes(ym)){
    return buildBuiltInDemoData(site, ym);
  }
  return null;
}

function svgToDataUri(svg){
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}
function buildDemoSignatureDataUri(name){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="240" height="100" viewBox="0 0 240 100">
    <rect width="240" height="100" fill="#ffffff"/>
    <path d="M12 65 C 35 20, 55 20, 68 55 S 105 85, 128 40 S 158 8, 180 48 S 205 78, 228 32"
          stroke="#1c3d6e" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="12" y="90" font-family="sans-serif" font-size="11" fill="#5e7385">${escapeHtml(name)}（示範簽名）</text>
  </svg>`;
  return svgToDataUri(svg);
}

function getBuiltInDemoApproval(site, ym){
  if(site === BUILT_IN_DEMO_SITE && BUILT_IN_DEMO_MONTHS.includes(ym)){
    const numDays = daysInMonth(ym);
    const teamLead = getSiteTeamLead(site);
    return {

      signFileName: `組長核定簽名_${ym}.png`,
      signImageData: buildDemoSignatureDataUri(teamLead ? teamLead.name : '組長'),

function todayMonthValue(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  return `${y}-${m}`;
}

function daysInMonth(ym){
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}

function storageKey(){

  const shift = shiftSelect.value;
  const ym = monthSelect.value || todayMonthValue();
  return `temp-log:${site}:${shift}:${ym}`;
}

function setStatus(msg, isError){
  statusText.textContent = msg;
  statusText.style.color = isError ? 'var(--danger)' : 'var(--ok)';
  if(msg){
    clearTimeout(setStatus._t);
    setStatus._t = setTimeout(()=>{ statusText.textContent=''; }, 2500);
  }
}

function buildTable(){
  const site = SITES[siteSelect.value];
  const fridges = site.fridges;
  const ym = monthSelect.value || todayMonthValue();
  const numDays = daysInMonth(ym);

  // header row 1: date(rowspan2), fridge names (colspan3), reason/abnormal/sign(rowspan2), reviewer(rowspan2)

  tableHeadRow2.innerHTML = '';

  const thDate = document.createElement('th');
  thDate.textContent = '日期';
  thDate.rowSpan = 2;
  tableHeadRow1.appendChild(thDate);

  fridges.forEach(f=>{
    const th = document.createElement('th');
    th.textContent = f;
    th.colSpan = 3;
    th.className = 'fridge-header';
    tableHeadRow1.appendChild(th);

    SUB_FIELDS.forEach(sf=>{
      const subTh = document.createElement('th');
      subTh.textContent = `${sf.label}(℃)`;
      subTh.style.fontWeight = '500';
      tableHeadRow2.appendChild(subTh);
    });
  });

  const thReason = document.createElement('th');
  thReason.textContent = '異常原因';
  thReason.rowSpan = 2;
  tableHeadRow1.appendChild(thReason);

  const thAbn = document.createElement('th');
  thAbn.textContent = '處理方式';
  thAbn.rowSpan = 2;
  tableHeadRow1.appendChild(thAbn);

  const thSign = document.createElement('th');
  thSign.textContent = '簽名';
  thSign.rowSpan = 2;
  tableHeadRow1.appendChild(thSign);

  const thReviewer = document.createElement('th');
  thReviewer.textContent = '檢核者（每7日）';
  thReviewer.rowSpan = 2;
  tableHeadRow1.appendChild(thReviewer);

  // body
  tableBody.innerHTML = '';
  const [y,m] = ym.split('-').map(Number);
  for(let d=1; d<=numDays; d++){
    const tr = document.createElement('tr');
    const weekday = new Date(y, m-1, d).getDay();
    if(weekday===0 || weekday===6) tr.classList.add('weekend');

    const tdDate = document.createElement('td');
    tdDate.className = 'date-cell';
    tdDate.textContent = d;
    tr.appendChild(tdDate);

    fridges.forEach((f, idx)=>{
      SUB_FIELDS.forEach(sf=>{
        const td = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'text';
        input.inputMode = 'decimal';
        input.pattern = '[0-9]*\\.?[0-9]';
        input.placeholder = '—';
        input.dataset.day = d;
        input.dataset.fridgeIndex = idx;
        input.dataset.role = 'temp';
        input.dataset.subKey = sf.key;

        function gridValidate(){
          const v = input.value.trim();
          if(v === '') return;
          const n = parseFloat(v);
          if(!isNaN(n)) input.value = n.toFixed(1);
          onTempInput({target: input});
          checkRowLogicError(tr, idx);
        }

        input.addEventListener('input', ()=>{
          const v = input.value;
          if(/^\d+\.\d$/.test(v)){
            gridValidate();
            const allInputs = [...tableBody.querySelectorAll('input[data-role="temp"]')];
            const i = allInputs.indexOf(input);
            if(i >= 0 && i < allInputs.length - 1){
              setTimeout(()=>{ allInputs[i+1].focus(); allInputs[i+1].select(); }, 50);
            }
          }
          onTempInput({target: input});
          checkRowLogicError(tr, idx);
        });
        input.addEventListener('blur', gridValidate);
        input.addEventListener('keydown', e=>{
          if(e.key === 'Enter' || e.key === 'Tab') gridValidate();
        });

        td.appendChild(input);
        tr.appendChild(td);
      });
    });

    const tdReason = document.createElement('td');
    const reasonInput = document.createElement('input');
    reasonInput.type = 'text';
    reasonInput.className = 'abn-input';
    reasonInput.placeholder = '異常時請說明原因';
    reasonInput.dataset.day = d;
    reasonInput.dataset.role = 'reason';
    reasonInput.addEventListener('input', scheduleSave);
    tdReason.appendChild(reasonInput);
    tr.appendChild(tdReason);

    const tdAbn = document.createElement('td');
    const abnInput = document.createElement('input');
    abnInput.type = 'text';
    abnInput.className = 'abn-input';
    abnInput.placeholder = '正常請留空';

    abnInput.addEventListener('input', scheduleSave);

    tableBody.appendChild(tr);
  }

  tableBody.querySelectorAll('tr').forEach((tr, rowIdx)=>{
    fridges.forEach((f, idx)=> checkRowLogicError(tr, idx));
  });

function checkRowLogicError(tr, fridgeIdx){
  const getVal = key => {
    const inp = tr.querySelector(`input[data-role="temp"][data-fridge-index="${fridgeIdx}"][data-sub-key="${key}"]`);
    return inp ? { inp, val: inp.value === '' ? null : parseFloat(inp.value) } : { inp:null, val:null };
  };
  const max = getVal('max');
  const min = getVal('min');
  const now = getVal('now');

  [max.inp, min.inp, now.inp].forEach(inp=>{ if(inp) inp.classList.remove('logic-error'); inp && inp.removeAttribute('title'); });

  let errorMsg = '';
  if(now.val !== null && max.val !== null && now.val > max.val){
    errorMsg = '現在溫度不可大於最高溫度';
  } else if(now.val !== null && min.val !== null && now.val < min.val){
    errorMsg = '現在溫度不可小於最低溫度';
  }
  if(errorMsg){
    if(now.inp){ now.inp.classList.add('logic-error'); now.inp.title = errorMsg; }
    if(max.inp){ max.inp.classList.add('logic-error'); max.inp.title = errorMsg; }
    if(min.inp){ min.inp.classList.add('logic-error'); min.inp.title = errorMsg; }
  }
  return !errorMsg;
}

const controlsEl = document.querySelector('.sticky-zone');

  requestAnimationFrame(()=>{
    const controlsHeight = controlsEl.offsetHeight;
    tableHeadRow1.style.top = controlsHeight + 'px';

}

  } else {

let saveTimer = null;
function scheduleSave(){
  // Auto-save disabled to prevent storage rate limit errors
  // Data is only saved when user explicitly clicks confirm buttons
}

function collectData(){
  const fridges = SITES[siteSelect.value].fridges;
  const rows = {};
  tableBody.querySelectorAll('tr').forEach(tr=>{
    const dateCell = tr.querySelector('.date-cell');
    const day = dateCell.textContent;
    const temps = fridges.map(()=>({min:'', now:'', max:''}));
    tr.querySelectorAll('input[data-role="temp"]').forEach(inp=>{
      const idx = Number(inp.dataset.fridgeIndex);
      const key = inp.dataset.subKey;
      if(temps[idx]) temps[idx][key] = inp.value || '';
    });
    const reasonInp = tr.querySelector('input[data-role="reason"]');
    const reason = reasonInp ? (reasonInp.value || '') : '';
    const abn = tr.querySelector('input[data-role="abn"]').value || '';
    const sign = tr.querySelector('[data-role="sign"]')?.value || '';
    rows[day] = { temps, reason, abn, sign };
  });
  const checkers = {};
  tableBody.querySelectorAll('input[data-role="checker"]').forEach(inp=>{
    checkers[inp.dataset.blockIndex] = inp.value || '';
  });
  return {
    manager: managerInput.value || '',
    fridges,
    rows,
    checkers
  };
}

// 帶重試機制的儲存寫入（共用模式：shared:true，讓所有人開同一個連結
// 都能看到、寫入同一份資料）。若遇到暫時性的頻率限制，會延遲後重試幾次，
// 都失敗才放棄，避免使用者按下確認卻因為背景錯誤而完全沒有反應。
async function storageSetWithRetry(key, value, maxRetries = 3){
  for(let attempt = 0; attempt <= maxRetries; attempt++){
    try{
      return await window.storage.set(key, value, true);
    }catch(err){
      const msg = String(err);
      if(msg.includes('rate limit') || msg.includes('Rate limit')){
        if(attempt < maxRetries){
          await new Promise(res => setTimeout(res, 300 * (attempt + 1)));
          continue;
        }
        console.warn('Storage rate limit - giving up after retries');
        return null;
      }
      throw err;
    }
  }
  return null;
}

async function saveCurrent(){
  try{
    const data = collectData();
    const key = storageKey();
    const result = await storageSetWithRetry(key, JSON.stringify(data));
    if(result){
      setStatus('已自動儲存');
    }
  }catch(err){
    console.error('儲存失敗', err);
    setStatus('儲存失敗，請稍後再試', true);
  }
}

async function loadCurrent(){
  buildTable();
  const key = storageKey();
  try{
    const result = await window.storage.get(key, true);
    if(result && result.value){
      const data = JSON.parse(result.value);
      managerInput.value = data.manager || '';
      Object.keys(data.rows || {}).forEach(day=>{
        const row = data.rows[day];
        const tr = [...tableBody.querySelectorAll('tr')].find(r=>r.querySelector('.date-cell').textContent === day);
        if(!tr) return;
        (row.temps || []).forEach((fridgeVals, idx)=>{
          if(!fridgeVals) return;
          SUB_FIELDS.forEach(sf=>{
            const inp = tr.querySelector(`input[data-role="temp"][data-fridge-index="${idx}"][data-sub-key="${sf.key}"]`);
            if(!inp) return;
            const val = fridgeVals[sf.key];
            if(val !== undefined && val !== ''){
              inp.value = val;
              if(isTempOutOfRange(val, sf.key)){
                inp.classList.add('out-of-range');
              }
            }
          });
          checkRowLogicError(tr, idx);
        });
        const reasonInput = tr.querySelector('input[data-role="reason"]');
        if(reasonInput) reasonInput.value = row.reason || '';
        const abnInput = tr.querySelector('input[data-role="abn"]');
        if(abnInput) abnInput.value = row.abn || '';
        const signInput = tr.querySelector('[data-role="sign"]');
        if(signInput) signInput.value = row.sign || '';
      });
      Object.keys(data.checkers || {}).forEach(blockIndex=>{
        const inp = tableBody.querySelector(`input[data-role="checker"][data-block-index="${blockIndex}"]`);
        if(inp) inp.value = data.checkers[blockIndex] || '';
      });
      setStatus('已載入先前儲存的紀錄');
    } else {
      setStatus('');
    }
  }catch(err){
    // key not found is expected for first use
    setStatus('');
  }
}

function realTodayInfo(){
  const d = new Date();
  return {
    ym: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
    day: String(d.getDate()),
    now: d
  };
}

function parseShiftTimes(label){
  const matches = label.match(/\d{1,2}:\d{2}/g);
  if(!matches || matches.length < 2) return null;
  const toMinutes = t=>{
    const [h,m] = t.split(':').map(Number);
    return h*60+m;
  };
  return { startMin: toMinutes(matches[0]), endMin: toMinutes(matches[1]) };
}

function populateDailyDateOptions(){
  const ym = monthSelect.value || todayMonthValue();
  const today = realTodayInfo();
  const isCurrentMonth = ym === today.ym;
  if(!dateSelectEl) return;
  const [y,m] = ym.split('-');
  const day = isCurrentMonth ? today.day : '01';
  dateSelectEl.value = `${y}-${m}-${String(day).padStart(2,'0')}`;
  monthSelect.value = ym;
}

function renderShiftPills(){
  const site = SITES[siteSelect.value];
  if(shiftPillsTopEl) shiftPillsTopEl.innerHTML = '';
  site.shifts.forEach(s=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'shift-pill' + (s.key === shiftSelect.value ? ' active' : '');
    btn.textContent = s.label.replace(/時段|（.*?）|\(.*?\)/g, '').trim();
    btn.addEventListener('click', ()=>{
      if(shiftSelect.value !== s.key){
        shiftSelect.value = s.key;
        shiftSelect.dispatchEvent(new Event('change'));
      }
    });
    if(shiftPillsTopEl) shiftPillsTopEl.appendChild(btn);
  });
}

// ── Batched storage: ONE key per site+month ──────────────────
// Format: temp-log-v2:{site}:{ym} = { shifts: { am:{rows:{}}, pm:{rows:{}}, ... }, checkers:[], approval:{} }

const _memCache = {}; // in-memory fallback if storage fails

function siteMonthKey(site, ym){ return `temp-log-v2:${site}:${ym}`; }

async function getSiteMonthData(site, ym){
  const key = siteMonthKey(site, ym);
  if(_memCache[key]) return _memCache[key];
  try{
    const r = await window.storage.get(key, true);
    if(r && r.value){ const d = JSON.parse(r.value); _memCache[key]=d; return d; }
  }catch(e){}
  const builtIn = getBuiltInDemoData(site, ym);
  if(builtIn){ _memCache[key] = builtIn; return builtIn; }
  return { shifts:{}, checkers:{}, approval:null };
}

async function saveSiteMonthData(site, ym, blob){
  const key = siteMonthKey(site, ym);
  _memCache[key] = blob; // always update memory
  try{
    await window.storage.set(key, JSON.stringify(blob), true);
  }catch(e){
    const msg = String(e);
    if(msg.includes('rate limit') || msg.includes('Rate limit')){
      // data is safe in memory for this session; silently ignore
      console.warn('Storage rate limit - data kept in memory only');
    } else {
      throw e;
    }
  }
}

async function getShiftData(site, shiftKey, ym){
  const blob = await getSiteMonthData(site, ym);
  return (blob.shifts && blob.shifts[shiftKey]) ? blob.shifts[shiftKey] : null;
}

async function setShiftData(site, shiftKey, ym, data){
  const blob = await getSiteMonthData(site, ym);
  if(!blob.shifts) blob.shifts = {};
  blob.shifts[shiftKey] = data;
  await saveSiteMonthData(site, ym, blob);
}

async function getSiteCheckers(site, ym){
  const blob = await getSiteMonthData(site, ym);
  return blob.checkers || [];
}

async function setSiteCheckers(site, ym, checkers){
  const blob = await getSiteMonthData(site, ym);
  blob.checkers = checkers;
  await saveSiteMonthData(site, ym, blob);
}

function isTempOutOfRange(v, subKey){
  if(v === '' || v === undefined || v === null) return false;
  const n = parseFloat(v);
  if(isNaN(n)) return false;
  // 所有欄位都必須在 2.0~8.0℃ 範圍內
  return n < 2.0 || n > 8.0;
}

function checkCardLogicError(card, fridgeIdx){
  const getInput = key => card.querySelector(`input[data-sub-key="${key}"]`);
  const maxInp = getInput('max');
  const minInp = getInput('min');
  const nowInp = getInput('now');
  [maxInp, minInp, nowInp].forEach(inp=>{ if(inp){ inp.classList.remove('logic-error'); inp.removeAttribute('title'); } });

  const maxV = maxInp && maxInp.value !== '' ? parseFloat(maxInp.value) : null;
  const minV = minInp && minInp.value !== '' ? parseFloat(minInp.value) : null;
  const nowV = nowInp && nowInp.value !== '' ? parseFloat(nowInp.value) : null;

  let errorMsg = '';
  if(nowV !== null && maxV !== null && nowV > maxV){
    errorMsg = '⚠ 現在溫度不可大於最高溫度';
  } else if(nowV !== null && minV !== null && nowV < minV){
    errorMsg = '⚠ 現在溫度不可小於最低溫度';
  }
  if(errorMsg){
    [maxInp, minInp, nowInp].forEach(inp=>{ if(inp){ inp.classList.add('logic-error'); inp.title = errorMsg; } });
  }

  // 常駐文字提示（不只靠滑鼠移過去的hover title），優先顯示邏輯錯誤，
  // 沒有邏輯錯誤時，列出超出正常範圍（2℃～8℃）的欄位，方便平板/手機使用者也能看到。
  const warningEl = card.querySelector('.fridge-temp-warning');
  if(warningEl){
    warningEl.classList.remove('warn-logic', 'warn-range');
    if(errorMsg){
      warningEl.textContent = errorMsg;
      warningEl.classList.add('warn-logic');
      warningEl.style.display = 'block';
    } else {
      const outParts = [];
      [{inp:minInp, label:'最低'}, {inp:nowInp, label:'現在'}, {inp:maxInp, label:'最高'}].forEach(o=>{
        if(o.inp && o.inp.value !== '' && isTempOutOfRange(o.inp.value, o.inp.dataset.subKey)){
          outParts.push(`${o.label}溫 ${o.inp.value}℃`);
        }
      });
      if(outParts.length){
        warningEl.textContent = `⚠ 溫度超出正常範圍（2℃～8℃）：${outParts.join('、')}`;
        warningEl.classList.add('warn-range');
        warningEl.style.display = 'block';
      } else {
        warningEl.textContent = '';
        warningEl.style.display = 'none';
      }
    }
  }

  return !errorMsg;
}

function dailyHasAnyError(){
  let hasError = false;
  fridgeCardsEl.querySelectorAll('.fridge-card').forEach((card, idx)=>{
    if(!checkCardLogicError(card, idx)) hasError = true;
  });
  return hasError;
}

function dailyHasAbnormal(){
  let abnormal = false;
  fridgeCardsEl.querySelectorAll('input[data-sub-key]').forEach(inp=>{
    if(isTempOutOfRange(inp.value, inp.dataset.subKey)) abnormal = true;
  });
  return abnormal;
}

function updateReasonBlockVisibility(){
  // per-fridge inline reason sections
  fridgeCardsEl.querySelectorAll('.fridge-reason-section').forEach(section=>{
    const idx = Number(section.dataset.fridgeIndex);
    const card = section.closest('.fridge-card');
    const hasAbn = [...card.querySelectorAll('input[data-sub-key]')].some(inp=>
      isTempOutOfRange(inp.value, inp.dataset.subKey)
    );
    section.style.display = hasAbn ? 'block' : 'none';
  });
  // hide old global reason block
  if(reasonBlockEl) reasonBlockEl.style.display = 'none';
  checkAllAbnReasonsForAbnBtn();
}

function checkAllAbnReasonsForAbnBtn(){
  const sections = [...fridgeCardsEl.querySelectorAll('.fridge-reason-section')].filter(s=>s.style.display!=='none');
  const allFilled = sections.length > 0 && sections.every(s=>{
    const inp = s.querySelector('.reason-text-input');
    return inp && inp.value.trim() !== '';
  });
  const btn = document.getElementById('abnRecordBtn');
  if(btn){
    btn.style.display = sections.length > 0 ? 'block' : 'none';
    btn.disabled = !allFilled;
    btn.style.opacity = allFilled ? '1' : '0.45';
  }
}

document.getElementById('confirmDailyBtn').addEventListener('click', async ()=>{
  // Cancel any pending auto-saves first to avoid rate limit conflicts
  if(typeof saveTimer !== 'undefined' && saveTimer) clearTimeout(saveTimer);
  // Small delay to let any in-flight storage ops finish
  await new Promise(r=>setTimeout(r, 300));

  const siteName = siteSelect.value;
  const site = SITES[siteName];
  const shiftKey = shiftSelect.value;
  const ym = monthSelect.value || todayMonthValue();
  const day = dailyDateSelect.value || '1';

  // 防呆檢查 1：現在溫度不可大於最高溫度 / 小於最低溫度
  if(dailyHasAnyError()){
    alert('⚠ 登記失敗：「現在溫度」不可大於「最高溫度」或小於「最低溫度」，請檢查標示為橘色的欄位後再試一次。');
    return;
  }

  // collect abnormal info (must be before validation that uses combinedReason)
  let dailyHasAbnormalTemps = false;
  let abnDetailMsg = '';
  const abnParts = [];
  fridgeCardsEl.querySelectorAll('input[data-sub-key]').forEach(inp=>{
    if(isTempOutOfRange(inp.value, inp.dataset.subKey)){
      dailyHasAbnormalTemps = true;
      const fi = Number(inp.dataset.fridgeIndex);
      const sf = SUB_FIELDS.find(s=>s.key===inp.dataset.subKey);
      abnParts.push(`${site.fridges[fi]} ${sf?sf.label:''} ${inp.value}℃`);
    }
  });
  abnDetailMsg = abnParts.join('、');

  // gather per-fridge reasons (must be before validation)
  const fridgeReasons = [];
  fridgeCardsEl.querySelectorAll('.fridge-reason-section').forEach(section=>{
    if(section.style.display !== 'none'){
      const inp = section.querySelector('.reason-text-input');
      fridgeReasons.push(inp ? inp.value.trim() : '');
    }
  });
  const combinedReason = fridgeReasons.filter(Boolean).join('；');

  // 防呆檢查 2：有溫度異常時提示需填寫原因（不強制阻擋）
  if(dailyHasAbnormal() && !combinedReason){
    const go = confirm('⚠ 偵測到溫度超出 2℃～8℃ 範圍。\n\n建議先填寫異常原因，確定要直接儲存嗎？');
    if(!go) return;
  }

  const data = (await getShiftData(siteName, shiftKey, ym)) || { manager: '', fridges: site.fridges, rows: {} };
  const existingRow = data.rows[day] || { temps: site.fridges.map(()=>({min:'',now:'',max:''})), reason:'', abn:'', sign:'' };

  const staffName = (currentUser && currentUser.name) || document.getElementById('dailyStaffSelect').value || '未具名';


  const temps = site.fridges.map(()=>({min:'',now:'',max:''}));
  fridgeCardsEl.querySelectorAll('input[data-sub-key]').forEach(inp=>{
    const idx = Number(inp.dataset.fridgeIndex);
    const key = inp.dataset.subKey;
    if(temps[idx]) temps[idx][key] = inp.value || '';
  });

  data.rows[day] = {
    temps,
    reason: combinedReason || (reasonInputEl ? reasonInputEl.value.trim() : ''),
    abn: existingRow.abn || '',
    sign: staffName,
    // 保留原本已填寫的異常處理紀錄，避免被這次登記整筆覆蓋掉
    fridgeAbn: existingRow.fridgeAbn || undefined,
    resolved: existingRow.resolved || '',
    recoverTemp: existingRow.recoverTemp || '',
    confirmedBy: existingRow.confirmedBy || (SITE_TEAM_LEAD_ID[siteName] || ''),
    savedAt: new Date().toISOString(),
    savedBy: staffName
  };
  data.manager = staffName || data.manager || '';

  try{
    await setShiftData(siteName, shiftKey, ym, data);
    setStatus('已確認本次登記');
    showSuccessToast('✅ 已確認本次登記');
    // lightweight updates only - avoid expensive full re-renders

});

/* ===================== Abnormal record section ===================== */

async function scanMonthAbnormal(siteName, ym){
  const site = SITES[siteName];
  const items = [];
  for(const shift of site.shifts){
    const data = await getShiftData(siteName, shift.key, ym);
    if(!data || !data.rows) continue;
    Object.keys(data.rows).sort((a,b)=>Number(a)-Number(b)).forEach(day=>{
      const row = data.rows[day];
      // per-fridge breakdown
      (row.temps || []).forEach((t, idx)=>{
        const fridgeName = site.fridges[idx];
        const abnParts = [];
        SUB_FIELDS.forEach(sf=>{
          const v = t ? t[sf.key] : '';
          if(isTempOutOfRange(v, sf.key)){
            abnParts.push(`${sf.label} ${v}℃`);
          }
        });
        if(abnParts.length > 0){
          // per-fridge abn record stored in row.fridgeAbn[idx]
          const fa = row.fridgeAbn && row.fridgeAbn[idx] ? row.fridgeAbn[idx] : {};
          items.push({
            day, shiftKey: shift.key, shiftLabel: shift.label.replace('時段',''),
            fridgeName,
            detail: `${fridgeName} ${abnParts.join('、')}`,
            reason: (row.reason || '').split('；')[idx] || row.reason || '',
            process: fa.abn || row.abn || '',
            sign: row.sign || '',
            resolved: fa.resolved || row.resolved || '',
            recoverTemp: fa.recoverTemp || row.recoverTemp || '',
            confirmedBy: resolveConfirmedByName(siteName, row.confirmedBy),
            confirmedDate: fa.savedAt || `${ym}-${String(day).padStart(2,'0')}`
          });
        }
      });
      // also include rows with reason/abn but no temp anomaly
      if((!row.temps || row.temps.every(t=>!t || (!isTempOutOfRange(t.min,'min')&&!isTempOutOfRange(t.now,'now')&&!isTempOutOfRange(t.max,'max')))) && (row.abn || row.reason)){
        items.push({
          day, shiftKey: shift.key, shiftLabel: shift.label.replace('時段',''),
          fridgeName: '－', detail: '－',
          reason: row.reason || '',
          process: row.abn || '',
          sign: row.sign || '',
          resolved: row.resolved || '',
          recoverTemp: row.recoverTemp || '',
          confirmedBy: resolveConfirmedByName(siteName, row.confirmedBy),
          confirmedDate: `${ym}-${String(day).padStart(2,'0')}`
        });
      }
    });
  }
  return items;
}

async function renderStatCards(){
  const siteName = siteSelect.value;
  const site = SITES[siteName];
  const ym = monthSelect.value || todayMonthValue();
  const numDays = daysInMonth(ym);

  // fetch all shifts' data for the month
  const shiftDatas = {};
  for(const shift of site.shifts){
    shiftDatas[shift.key] = (await getShiftData(siteName, shift.key, ym)) || { rows:{} };
  }

  // 本月登記天數：至少一個時段有 savedAt 的日期數
  const loggedDays = new Set();
  let filledShiftDayCount = 0;
  Object.values(shiftDatas).forEach(d=>{
    Object.keys(d.rows || {}).forEach(day=>{
      if(d.rows[day] && d.rows[day].savedAt){
        loggedDays.add(day);
        filledShiftDayCount++;
      }
    });
  });
  document.getElementById('statDaysLogged').textContent = loggedDays.size;

  const abnormalItems = await scanMonthAbnormal(siteName, ym);
  document.getElementById('statAbnormalCount').textContent = abnormalItems.length;

  const totalSlots = numDays * site.shifts.length;
  const rate = totalSlots > 0 ? Math.round((filledShiftDayCount / totalSlots) * 100) : 0;
  const rateEl = document.getElementById('statCompletionRate');
  rateEl.textContent = `${rate}%`;
  const rateCard = rateEl.closest('.stat-card');
  if(rateCard) rateCard.classList.toggle('incomplete', rate < 100);
}

async function renderMonthlyFeed(){
  const siteName = siteSelect.value;
  const site = SITES[siteName];
  const ym = monthSelect.value || todayMonthValue();
  const numDays = daysInMonth(ym);
  const [y, m] = ym.split('-').map(Number);
  const today = realTodayInfo();
  const isCurrentMonth = ym === today.ym;

  document.getElementById('feedHeaderBar').innerHTML = `
    <span>【${escapeHtml(siteName)}】　${y}年${m}月　本月總覽</span>
  `;

  const shiftDatas = {};
  for(const shift of site.shifts){
    shiftDatas[shift.key] = (await getShiftData(siteName, shift.key, ym)) || { rows:{} };
  }

  // header — build real thead; sticky positioning is now handled purely by CSS
  // (table.feed-table th{ position:sticky; top:0 }) relative to the
  // .feed-table-wrap's own scroll box, so it no longer depends on a
  // JS-computed pixel offset that could drift and overlap the first row.
  const headRow = document.getElementById('feedTableHeadRow');

  const addTh = (text, sub, styleAttr)=>{
    const th = document.createElement('th');
    if(styleAttr) th.style.cssText = styleAttr;
    if(sub){
      th.innerHTML = `${escapeHtml(text)}<br><small style="font-weight:500;font-size:10px;">${escapeHtml(sub)}</small>`;
    } else {
      th.textContent = text;
    }
    headRow.appendChild(th);
  };

  headRow.innerHTML = '';
  addTh('日期');
  addTh('時段');
  site.fridges.forEach((f, fIdx)=>{
    const color = FRIDGE_COLORS[fIdx % FRIDGE_COLORS.length];
    const styleAttr = `background:${color.inputBg};color:${color.border};`;
    SUB_FIELDS.forEach(sf=>{
      addTh(f, sf.label, styleAttr);
    });
  });
  addTh('登記人員');
  addTh('異常原因說明');

  // clear feedStickyHead (no longer needed)
  const stickyHead = document.getElementById('feedStickyHead');
  if(stickyHead) stickyHead.innerHTML = '';

  const body = document.getElementById('feedTableBody');
  body.innerHTML = '';

  for(let d=1; d<=numDays; d++){
    const day = String(d);
    const isToday = isCurrentMonth && day === today.day;
    const groupEven = (d % 2 === 0);

    site.shifts.forEach((shift, shiftIdx)=>{
      const tr = document.createElement('tr');
      tr.className = (isToday ? 'feed-group-today' : (groupEven ? 'feed-group-even' : ''));

      if(shiftIdx === 0){
        const tdDate = document.createElement('td');
        tdDate.className = 'feed-date-cell';
        tdDate.rowSpan = site.shifts.length;
        tdDate.innerHTML = `${d}${isToday ? '<span class="today-pin">📍</span>' : ''}`;
        tr.appendChild(tdDate);
      }

      const tdShift = document.createElement('td');
      tdShift.className = 'feed-shift-cell';
      tdShift.textContent = shift.label.replace(/時段|（.*?）|\(.*?\)/g, '').trim();
      tr.appendChild(tdShift);

      const row = shiftDatas[shift.key].rows ? shiftDatas[shift.key].rows[day] : null;

      site.fridges.forEach((f, idx)=>{
        const t = row && row.temps && row.temps[idx] ? row.temps[idx] : null;
        SUB_FIELDS.forEach(sf=>{
          const td = document.createElement('td');
          const v = t ? (t[sf.key] || '') : '';
          if(v === ''){
            td.className = 'feed-empty';
            td.textContent = '—';
          } else {
            td.textContent = v;
            if(isTempOutOfRange(v, sf.key)) td.className = 'feed-out-of-range';
          }
          tr.appendChild(td);
        });
      });

      const tdSign = document.createElement('td');
      tdSign.textContent = (row && row.sign) ? row.sign : '—';
      if(!row || !row.sign) tdSign.className = 'feed-empty';
      tr.appendChild(tdSign);

      const tdReason = document.createElement('td');
      tdReason.textContent = (row && row.reason) ? row.reason : '—';
      if(!row || !row.reason) tdReason.className = 'feed-empty';
      tr.appendChild(tdReason);

      body.appendChild(tr);
    });

    // insert weekly checker row after every 7 days
    if(d % 7 === 0){
      const blockIndex = Math.floor((d - 1) / 7);
      const startDay = blockIndex * 7 + 1;
      const endDay = d;
      const checkers = await getSiteCheckers(siteName, ym);
      let saved = checkers[blockIndex];
      if(!saved || !saved.name){
        const defaultName = getSiteDefaultCheckerName(siteName);
        if(defaultName){
          saved = { name: defaultName, date: new Date().toISOString().slice(0,10) };
          checkers[blockIndex] = saved;
          await setSiteCheckers(siteName, ym, checkers);
        }
      }
      const colCount = 2 + site.fridges.length * 3 + 2;

      const checkerTr = document.createElement('tr');
      checkerTr.className = 'checker-inline-row';
      const checkerTd = document.createElement('td');
      checkerTd.colSpan = colCount;

      const label = document.createElement('span');
      label.className = 'checker-inline-label';
      label.textContent = `📋 第 ${blockIndex+1} 週檢核（${startDay}日–${endDay}日）　檢核者：`;
      checkerTd.appendChild(label);

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = '請輸入檢核者姓名';
      inp.className = 'checker-inline-input';
      inp.value = (saved && saved.name) || '';
      const bi = blockIndex;
      let wkTimer = null;
      inp.addEventListener('input', ()=>{
        clearTimeout(wkTimer);
        wkTimer = setTimeout(async ()=>{
          const latest = await getSiteCheckers(siteName, ym);
          latest[bi] = { name: inp.value, date: inp.value ? new Date().toISOString().slice(0,10) : '' };
          await setSiteCheckers(siteName, ym, latest);
          setStatus('週檢核已更新');
        }, 600);
      });
      checkerTd.appendChild(inp);

      if(saved && saved.name){
        const ok = document.createElement('span');
        ok.style.cssText = 'margin-left:8px;font-size:11px;color:var(--ok);';
        ok.textContent = `✅ ${saved.date||''}`;
        checkerTd.appendChild(ok);
      }
      checkerTr.appendChild(checkerTd);
      body.appendChild(checkerTr);
    }
  }

  await renderApprovalCard(siteName, ym);
  await renderAbnSectionGrid(siteName, ym);
}

async function checkMonthComplete(siteName, ym){
  const site = SITES[siteName];
  const numDays = daysInMonth(ym);
  for(const shift of site.shifts){
    const data = await getShiftData(siteName, shift.key, ym);
    for(let d=1; d<=numDays; d++){
      const row = data && data.rows && data.rows[d];
      if(!row) return false;
      const hasTemps = (row.temps || []).every(t=> t && t.min && t.now && t.max);
      if(!hasTemps) return false;

  return true;
}

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// 將「年-月」與日，格式化為 MM/DD（例如 2026-07、20 → 07/20）
function formatMonthDay(ym, day){
  const parts = String(ym || '').split('-');
  const mm = parts[1] ? parts[1].padStart(2,'0') : '';
  const dd = String(day).padStart(2,'0');
  return mm ? `${mm}/${dd}` : dd;
}

// 將班別標籤中的括號時間，格式化為 HH:MM-HH:MM（例如「上午時段（7:00～10:00）」→「07:00-10:00」）
function formatShiftTimeRange(label){
  const m = String(label || '').match(/[（(]([^）)]+)[）)]/);
  if(!m) return '';
  return m[1].replace(/～/g, '-').replace(/~/g, '-').split('-').map(t=>{
    const p = t.split(':');
    return p.length === 2 ? `${p[0].padStart(2,'0')}:${p[1]}` : t;
  }).join('-');
}
const SHIFT_HEADER_COLORS = [
  { bg:'#dbeeff', fg:'#0f3057', light:'#eef7ff' },  // 上午－藍
  { bg:'#fbeecb', fg:'#8a6d1f', light:'#fdf6e7' },  // 下午－米黃
  { bg:'#fbdde8', fg:'#a02857', light:'#fdeef3' }   // 大夜－粉紅
];

// 將「年-月-日」字串（例如 2026-06-12）格式化為 MM/DD（例如 06/12）
function formatSavedDateShort(dateStr){
  const parts = String(dateStr || '').split('-');
  if(parts.length >= 3) return `${parts[1]}/${parts[2]}`;
  return '';
}

      const timeRange = formatShiftTimeRange(shift.label);
      const color = SHIFT_HEADER_COLORS[sIdx % SHIFT_HEADER_COLORS.length];
      html += `<th colspan="4" style="background:${color.bg};color:${color.fg};">${escapeHtml(shiftShort)}${timeRange ? `(${escapeHtml(timeRange)})` : ''}</th>`;
    });
    html += '</tr><tr>';
    site.shifts.forEach((shift, sIdx)=>{
      const color = SHIFT_HEADER_COLORS[sIdx % SHIFT_HEADER_COLORS.length];
      const styleAttr = ` style="background:${color.light};color:${color.fg};"`;
      html += `<th${styleAttr}>最低(℃)</th><th${styleAttr}>現在(℃)</th><th${styleAttr}>最高(℃)</th><th${styleAttr}>簽名</th>`;
    });
    html += '</tr></thead><tbody>';

    const abnormalRows = [];

    for(let d=1; d<=numDaysInMonth; d++){
      const day = String(d);
      html += `<tr><td>${day}</td>`;

      site.shifts.forEach(shift=>{
        const shiftData = shiftDataMap[shift.key];
        const row = shiftData.rows ? shiftData.rows[day] : null;
        const t = row && row.temps && row.temps[fridgeIdx] ? row.temps[fridgeIdx] : {min:'',now:'',max:''};
        const sign = row ? (row.sign || '') : '';

        let rowAbnormal = false;
        const detailParts = [];
        // order: min, now, max
        SUB_FIELDS.forEach(sf=>{
          const v = t[sf.key] || '';
          const out = isTempOutOfRange(v, sf.key);
          if(out){ rowAbnormal = true; detailParts.push(`${sf.label} ${v}℃`); }
          html += `<td${out ? ' style="color:#b3261e;font-weight:700;"' : ''}>${escapeHtml(v)}</td>`;
        });
        html += `<td>${escapeHtml(sign)}</td>`;

        const fa = row && row.fridgeAbn && row.fridgeAbn[fridgeIdx] ? row.fridgeAbn[fridgeIdx] : null;
        // 只有「這個冰箱本身」溫度異常，或針對這個冰箱有留存專屬的異常處理紀錄時，
        // 才把這筆資料列進這個冰箱的異常處理記錄——避免其他冰箱的頁面出現
        // 「異常值」空白（因為 row.reason／row.abn 原本是整個班別共用，並非針對單一冰箱）。
        if(row && (rowAbnormal || fa)){
          abnormalRows.push({
            day,
            shiftLabel: shift.label.replace(/時段|（.*?）|\(.*?\)/g,'').trim(),
            detail: rowAbnormal ? detailParts.join('、') : '－',
            reason: row.reason || '',
            process: (fa && fa.abn) || row.abn || '',
            sign: row.sign || '',
            resolved: (fa && fa.resolved) || row.resolved || '',
            recoverTemp: (fa && fa.recoverTemp) || row.recoverTemp || '',
            confirmedBy: resolveConfirmedByName(siteName, row.confirmedBy),
            confirmedDate: (fa && fa.savedAt) ? formatSavedDateShort(fa.savedAt) : formatMonthDay(ym, day)
          });
        }
      });

      html += '</tr>';

      // weekly reviewer row — inserted right after each 7-day block (and the final partial week)
      const isBlockEnd = (d % 7 === 0) || (d === numDaysInMonth);
      if(isBlockEnd){
        const blockIndex = Math.floor((d - 1) / 7);
        const startDay = blockIndex * 7 + 1;
        const endDay = d;
        const saved = checkers ? checkers[blockIndex] : null;
        const checkerName = (saved && saved.name) ? saved.name : '＿＿＿＿＿';
        const checkerDate = (saved && saved.date) ? saved.date : '';
        html += `<tr class="pdf-week-row"><td colspan="${totalCols}">第 ${blockIndex+1} 週檢核（${startDay}日–${endDay}日）　檢核者簽名：${escapeHtml(checkerName)}　${escapeHtml(checkerDate)}</td></tr>`;
      }
    }
    html += '</tbody></table>';

    // abnormal record table (scoped to this fridge)
    html += '<div class="pdf-abn-title">⚠ 異常處理記錄　<span class="pdf-abn-note">※　冰箱溫度需維持在 2℃～8℃</span></div>';
    html += `<table class="pdf-abn-table"><thead><tr>
      <th style="width:6%;">日期</th>
      <th style="width:7%;">時段</th>
      <th style="width:13%;">異常值</th>
      <th style="width:14%;">原因說明</th>
      <th style="width:8%;">登記人員</th>
      <th style="width:7%;">是否解除</th>
      <th>處理方式</th>
      <th style="width:8%;">回復值</th>
      <th style="width:9%;">確認人員</th>
    </tr></thead><tbody>`;

    if(abnormalRows.length > 0){
      abnormalRows.forEach(r=>{
        const shiftShort = r.shiftLabel.replace(/（.*?）|\(.*?\)/g,'').trim();
        html += `<tr>
          <td>${escapeHtml(formatMonthDay(ym, r.day))}</td>
          <td>${escapeHtml(shiftShort)}</td>
          <td>${escapeHtml(r.detail)}</td>
          <td class="process-cell">${escapeHtml(r.reason)}</td>
          <td>${escapeHtml(r.sign)}</td>
          <td>${escapeHtml(r.resolved||'')}</td>
          <td class="process-cell">${escapeHtml(r.process)}</td>
          <td class="recover-cell">${escapeHtml(r.recoverTemp||'')}</td>
          <td>${escapeHtml(r.confirmedBy||'')}${r.confirmedDate ? `<br>${escapeHtml(r.confirmedDate)}` : ''}</td>
        </tr>`;
      });
    } else {
      html += `<tr><td colspan="9" style="color:#5e7385;">本月無異常紀錄</td></tr>`;
    }
    html += '</tbody></table>';

    // monthly approval footer (組長月底核定)
    if(approval && approval.approved){
      html += `<div class="pdf-approval approved">
        <span>☑ 組長月底核定</span>
        <span class="pdf-approval-detail">核定人員：${escapeHtml(approval.approverName||'')}${approval.approverId ? `（${escapeHtml(approval.approverId)}）` : ''}</span>
        <span class="pdf-approval-detail">核定日期：${escapeHtml(approval.approvedAt||'')}</span>
        ${approval.note ? `<span class="pdf-approval-detail">備註：${escapeHtml(approval.note)}</span>` : ''}
        ${approval.signImageData ? `<img src="${approval.signImageData}" class="pdf-sign-image">` : ''}
      </div>`;
    } else {
      html += `<div class="pdf-approval pending">
        <span>☐ 組長月底核定：尚未核定</span>
      </div>`;
    }

    html += '</div>'; // .pdf-page
  });

  document.getElementById('pdfAreaContent').innerHTML = html;
}

/* ===== Card Login ===== */
const topbarUser = document.getElementById('topbarUser');
const topbarLogin = document.getElementById('topbarLogin');
const userBadge = document.getElementById('userBadge');

const topbarSubtitle = document.getElementById('topbarSubtitle');
const loginOverlay = document.getElementById('loginOverlay');
const loginIdInput = document.getElementById('loginIdInput');
const loginNameDisplay = document.getElementById('loginNameDisplay');
const loginHintEl = document.getElementById('loginHint');

let currentUser = null;

function allStaff(){
  const all = [];
  Object.values(STAFF).forEach(arr=> all.push(...arr));
  return all;
}

function resetLoginForm(){
  loginIdInput.value = '';
  loginNameDisplay.textContent = '輸入員工編號後自動顯示';
  loginNameDisplay.classList.remove('found');
  loginHintEl.textContent = '';
  loginIdInput.focus();
}

loginIdInput.addEventListener('input', ()=>{
  const val = loginIdInput.value.replace(/\D/g,'').slice(0,5);
  loginIdInput.value = val;
  loginHintEl.textContent = '';
  if(val.length === 5){
    const target = 'Y' + val;
    const found = allStaff().find(s => s.id.trim() === target);
    if(found){
      loginNameDisplay.textContent = found.name;
      loginNameDisplay.classList.add('found');
    } else {
      loginNameDisplay.textContent = '找不到此員工編號';
      loginNameDisplay.classList.remove('found');
      loginHintEl.textContent = '找不到此員工編號，請確認後再試';
    }
  } else {
    loginNameDisplay.textContent = '輸入員工編號後自動顯示';
    loginNameDisplay.classList.remove('found');
  }
});

loginIdInput.addEventListener('keydown', e=>{
  if(e.key === 'Enter') attemptLogin();
});

document.getElementById('numOk').addEventListener('click', attemptLogin);

function attemptLogin(){
  const val = loginIdInput.value.replace(/\D/g,'').slice(0,5);
  if(val.length < 5){
    loginHintEl.textContent = '請輸入完整的5碼員工編號';
    loginIdInput.focus();
    return;
  }
  const target = 'Y' + val;
  const found = allStaff().find(s => s.id.trim() === target);
  if(found){
    applyLogin(found);
    loginOverlay.classList.add('hidden');
    resetLoginForm();
  } else {
    loginHintEl.textContent = '找不到此員工編號，請重新輸入';
    loginIdInput.select();
  }
}

function findStaffSite(user){
  for(const [site, list] of Object.entries(STAFF)){
    if(list.find(s => s.id.trim() === user.id.trim())) return site;
  }
  return null;
}

const abnRecordModal = document.getElementById('abnRecordModal');
const abnProcessInput = document.getElementById('abnProcessInput');
const abnRecoverInput = document.getElementById('abnRecoverInput');
const abnRecordSubmitBtn = document.getElementById('abnRecordSubmitBtn');
let _abnRecordCtx = null;

// trigger button (legacy, hidden)
document.getElementById('abnRecordBtn').addEventListener('click', ()=>{});

function openAbnRecordModal(fridgeIdx, reason){
  const siteName = siteSelect.value;
  const site = SITES[siteName];
  const shiftKey = shiftSelect.value;
  const shiftObj = site.shifts.find(s=>s.key===shiftKey);
  const dateStr = dateSelectEl ? dateSelectEl.value : '';

  // find the abnBtn and doneBar for this fridge
  const section = fridgeCardsEl.querySelector(`.fridge-reason-section[data-fridge-index="${fridgeIdx}"]`);
  _abnRecordCtx = {
    fridgeIdx, reason,
    abnBtn: section ? section.querySelector('.fridge-abn-record-btn') : null,
    doneBar: section ? section.querySelector('.abn-done-bar') : null
  };

  // fill meta
  document.getElementById('abnRecordMeta').textContent =
    `${dateStr}　${shiftObj ? shiftObj.label.replace(/（.*?）/,'') : ''}　${siteName}`;

  // fill reason display
  document.getElementById('abnReasonDisplay').value = reason;

  // reset fields
  abnProcessInput.value = '';
  abnRecoverInput.value = '';
  document.getElementById('abnResolvedSelect').value = '';
  document.getElementById('abnProcessCannedBtns').style.display = '';
  abnRecordModal.classList.remove('hidden');
}

  });
});

abnRecordSubmitBtn.addEventListener('click', async ()=>{
  const siteName = siteSelect.value;
  const shiftKey = shiftSelect.value;
  const ym = monthSelect.value || todayMonthValue();
  const day = String(parseInt((dateSelectEl ? dateSelectEl.value : '').split('-')[2] || '1'));
  const fridgeIdx = _abnRecordCtx ? _abnRecordCtx.fridgeIdx : 0;
  const site = SITES[siteName];
  let saveOk = false;
  try{
    const data = (await getShiftData(siteName, shiftKey, ym)) || { rows: {} };
    if(!data.rows) data.rows = {};
    // 若當天這個班別的資料還沒被「確認本次登記」建立過，先建立一筆空白資料，
    // 避免下面的寫入因為 data.rows[day] 不存在而被靜默略過
    // （之前會出現：跳出「已儲存」提示，但實際上什麼都沒存到）。
    if(!data.rows[day]){
      data.rows[day] = {
        temps: site.fridges.map(()=>({min:'',now:'',max:''})),
        reason: (_abnRecordCtx && _abnRecordCtx.reason) || '',
        abn: '', sign: ''
      };
    }
    if(!data.rows[day].fridgeAbn) data.rows[day].fridgeAbn = {};
    data.rows[day].fridgeAbn[fridgeIdx] = {
      abn: abnProcessInput.value.trim(),
      recoverTemp: abnRecoverInput.value.trim(),
      resolved: document.getElementById('abnResolvedSelect').value,
      confirmed: true,
      savedAt: new Date().toISOString().slice(0,10)
    };
    // also keep row-level for backwards compatibility
    data.rows[day].abn = abnProcessInput.value.trim();
    data.rows[day].recoverTemp = abnRecoverInput.value.trim();
    data.rows[day].resolved = document.getElementById('abnResolvedSelect').value;
    if(!data.rows[day].reason && _abnRecordCtx && _abnRecordCtx.reason){
      data.rows[day].reason = _abnRecordCtx.reason;
    }
    await setShiftData(siteName, shiftKey, ym, data);
    saveOk = true;
  }catch(err){
    console.error('異常處理紀錄儲存失敗', err);
  }

  // 不論上面是否成功，都要讓彈窗確實關閉、按鈕確實有反應，
  // 避免看起來像「按了沒反應」；失敗時另外用明確訊息告知。
  abnRecordModal.classList.add('hidden');
  if(saveOk){
    setStatus('異常處理紀錄已儲存');
    if(_abnRecordCtx && _abnRecordCtx.doneBar){
      _abnRecordCtx.doneBar.style.display = 'flex';
      if(_abnRecordCtx.abnBtn) _abnRecordCtx.abnBtn.style.display = 'none';
    }
    setTimeout(()=>{ showSuccessToast('✅ 異常處理紀錄已儲存'); }, 100);
    await renderAbnSection();
  } else {
    setStatus('儲存失敗，請稍後再試', true);
    alert('⚠ 異常處理紀錄儲存失敗，請稍後再試一次。\n（若持續發生，請重新整理頁面後再試）');
  }
});

function showSuccessToast(msg, duration=2000){
  const toast = document.getElementById('successToast');
  const msgEl = document.getElementById('successToastMsg');
  if(!toast || !msgEl) return;
  msgEl.textContent = msg;
  toast.style.display = 'flex';
  toast.style.opacity = '0';
  toast.style.transform = 'translate(-50%,-50%) scale(0.85)';
  setTimeout(()=>{
    toast.style.opacity = '1';
    toast.style.transform = 'translate(-50%,-50%) scale(1)';
  }, 10);
  setTimeout(()=>{
    toast.style.opacity = '0';
    toast.style.transform = 'translate(-50%,-50%) scale(0.85)';
    setTimeout(()=>{ toast.style.display = 'none'; }, 300);
  }, duration);
}

  currentUser = user;

}
